name: DevOps CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t devops_app .

      - name: Run container
        run: docker run -d -p 5000:5000 devops_app

      - name: Test container
        run: |
          sleep 5
          curl -f http://localhost:5000 || exit 1